---
openclaw_service_name: openclaw
openclaw_service_user: openclaw
openclaw_service_group: openclaw
openclaw_gateway_port: 18789
openclaw_docker_bridge_subnet: "172.18.0.0/16"
openclaw_service_domain: "openclaw.{{ domain }}"
openclaw_home: /var/lib/openclaw
openclaw_traefik_config_dir: /etc/traefik
openclaw_nodejs_version: "22"
openclaw_version: "latest"
openclaw_pnpm_home: "{{ openclaw_home }}/.local/share/pnpm"
openclaw_traefik_image: "traefik:v3.6"
openclaw_traefik_container_name: traefik

openclaw_backup_cron: "*-*-* 04:00:00"
openclaw_backup_bucket_name: "home-server-backup.iamrobertyoung.co.uk"
openclaw_backup_aws_region: eu-west-1
openclaw_backup_mosquitto_host: mosquitto.local.iamrobertyoung.co.uk
openclaw_backup_mosquitto_username: home-assistant
# Secrets (override in playbook from SSM):
openclaw_backup_aws_access_key: ""
openclaw_backup_aws_secret_access_key: ""
openclaw_backup_mosquitto_password: ""
