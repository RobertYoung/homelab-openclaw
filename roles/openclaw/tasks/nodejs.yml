---
- name: Install prerequisites for NodeSource repository
  become: true
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Download NodeSource setup script
  ansible.builtin.get_url:
    url: "https://deb.nodesource.com/setup_{{ openclaw_nodejs_version }}.x"
    dest: /tmp/nodesource_setup.sh
    mode: "0755"

- name: Run NodeSource setup script
  become: true
  ansible.builtin.command:
    cmd: bash /tmp/nodesource_setup.sh
    creates: /etc/apt/sources.list.d/nodesource.list

- name: Install Node.js
  become: true
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Install pnpm globally via npm
  become: true
  community.general.npm:
    name: pnpm
    global: true
    state: present
