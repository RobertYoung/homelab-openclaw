---
- name: Install prerequisites for NodeSource repository
  become: true
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Download and run NodeSource setup script for Node.js {{ openclaw_nodejs_version }}.x
  become: true
  ansible.builtin.shell:
    cmd: "curl -fsSL https://deb.nodesource.com/setup_{{ openclaw_nodejs_version }}.x | bash -"
    creates: /etc/apt/sources.list.d/nodesource.list

- name: Install Node.js
  become: true
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Install pnpm globally via npm
  become: true
  community.general.npm:
    name: pnpm
    global: true
    state: present
