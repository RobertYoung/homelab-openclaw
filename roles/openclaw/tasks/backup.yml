---
- name: Install backup dependencies
  ansible.builtin.apt:
    name:
      - awscli
      - mosquitto-clients
    state: present

- name: Copy backup script
  ansible.builtin.copy:
    src: backup.sh
    dest: /usr/local/bin/openclaw-backup.sh
    mode: "0755"
    owner: root
    group: root

- name: Template backup environment file
  ansible.builtin.template:
    src: backup/backup.env.j2
    dest: /etc/openclaw/backup.env
    mode: "0400"
    owner: root
    group: root

- name: Template backup systemd service
  ansible.builtin.template:
    src: backup/backup.service.j2
    dest: /etc/systemd/system/openclaw-backup.service
    mode: "0644"
    owner: root
    group: root

- name: Template backup systemd timer
  ansible.builtin.template:
    src: backup/backup.timer.j2
    dest: /etc/systemd/system/openclaw-backup.timer
    mode: "0644"
    owner: root
    group: root

- name: Enable and start backup timer
  ansible.builtin.systemd:
    name: openclaw-backup.timer
    enabled: true
    state: started
    daemon_reload: true
